title: "Изучение Библии"
description: "Платформа для изучения Библии в группах и индивидуально"
baseurl: ""
url: ""
permalink: pretty

# Тема оформления по умолчанию для неавторизованных пользователей.
# Доступные значения: original (классика), papyrus (журнал),
# hearth (тёплый), covenant (тёмный современный).
default_theme: original

collections:
  lessons:
    output: true
    permalink: /lessons/:slug/

defaults:
  - scope:
      path: ""
      type: "lessons"
    values:
      layout: "lesson"

exclude:
  - Gemfile
  - Gemfile.lock
  - "*.docx"
  - node_modules
  - vendor
