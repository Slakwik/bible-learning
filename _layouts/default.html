<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <link rel="icon" href="{{ '/favicon.ico' | relative_url }}" type="image/x-icon">
  <link rel="icon" href="{{ '/assets/img/favicon.png' | relative_url }}" type="image/png">
  <script>
    // Применяем тему до первой отрисовки, чтобы не было мерцания.
    (function () {
      var defaultTheme = '{{ site.default_theme | default: "original" }}';
      var saved = null;
      try { saved = localStorage.getItem('bible-theme'); } catch (e) {}
      document.documentElement.setAttribute('data-theme', saved || defaultTheme);
    })();
  </script>
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/themes.css' | relative_url }}">
</head>
<body>
  {% include header.html %}
  <main>
    {{ content }}
  </main>
  {% include footer.html %}
  {% include firebase-scripts.html %}
  {% if page.extra_js %}
    {% for js in page.extra_js %}
    <script src="{{ js | relative_url }}"></script>
    {% endfor %}
  {% endif %}
</body>
</html>
